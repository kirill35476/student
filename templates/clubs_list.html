<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <div class="container py-4">
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/">Главная</a></li>
                <li class="breadcrumb-item active">Кружки и секции</li>
            </ol>
        </nav>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1><i class="bi bi-palette"></i> {{ title }}</h1>
            <a href="/admin/clubs" class="btn btn-outline-primary">
                <i class="bi bi-gear"></i> Управление (админ)
            </a>
        </div>

        {% if clubs %}
            <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
                {% for club in clubs %}
                <div class="col">
                    <div class="card h-100 shadow-sm border-0">
                        <div class="card-body">
                            <h5 class="card-title">{{ club.name }}</h5>
                            <p class="card-text">
                                <i class="bi bi-person-badge"></i> {{ club.teacher }}<br>
                                <i class="bi bi-door-open"></i> Кабинет {{ club.room }}<br>
                                <i class="bi bi-clock"></i> {{ club.schedule or 'расписание уточняется' }}
                            </p>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        {% else %}
            <div class="alert alert-info">
                <i class="bi bi-info-circle"></i> Список кружков пуст.
            </div>
        {% endif %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
