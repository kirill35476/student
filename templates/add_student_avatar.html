{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block breadcrumb_items %}
<li class="breadcrumb-item active">Добавить ученика</li>
{% endblock %}

{% block content %}
<div class="form-container">
    <h4 class="mb-4"><i class="bi bi-person-plus"></i> {{ title }}</h4>
    <form action="/add-student-with-avatar" method="post" enctype="multipart/form-data">
        <div class="mb-3"><label class="form-label">Имя *</label><input type="text" name="name" class="form-control" required></div>
        <div class="mb-3"><label class="form-label">Класс *</label><input type="number" name="grade" class="form-control" min="1" max="11" required></div>
        <div class="mb-3"><label class="form-label">Хобби *</label><input type="text" name="hobby" class="form-control" required></div>
        <div class="mb-3"><label class="form-label">Фото *</label><input type="file" name="avatar" class="form-control" accept="image/*" required></div>
        <div class="d-grid gap-2">
            <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i> Добавить</button>
            <a href="/" class="btn btn-outline-secondary">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
