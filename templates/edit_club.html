{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block breadcrumb_items %}
<li class="breadcrumb-item"><a href="/clubs">Кружки</a></li>
<li class="breadcrumb-item"><a href="/admin/clubs">Управление</a></li>
<li class="breadcrumb-item active">Редактирование</li>
{% endblock %}

{% block content %}
<div class="form-container">
    <h4 class="mb-4"><i class="bi bi-pencil-square"></i> {{ title }}</h4>
    <form action="/admin/clubs/{{ club.id }}/edit" method="post">
        <div class="mb-3"><label class="form-label">Название</label><input type="text" name="name" class="form-control" value="{{ club.name }}" required></div>
        <div class="mb-3"><label class="form-label">Преподаватель</label><input type="text" name="teacher" class="form-control" value="{{ club.teacher }}" required></div>
        <div class="mb-3"><label class="form-label">Кабинет</label><input type="text" name="room" class="form-control" value="{{ club.room }}" required></div>
        <div class="mb-3"><label class="form-label">Расписание</label><input type="text" name="schedule" class="form-control" value="{{ club.schedule }}"></div>
        <div class="d-grid gap-2">
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Сохранить</button>
            <a href="/admin/clubs" class="btn btn-outline-secondary">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
