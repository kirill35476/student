<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/">Главная</a></li>
                <li class="breadcrumb-item"><a href="/clubs">Кружки</a></li>
                <li class="breadcrumb-item"><a href="/admin/clubs">Администрирование</a></li>
                <li class="breadcrumb-item active">Редактирование</li>
            </ol>
        </nav>

        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white">
                        <h4 class="mb-0"><i class="bi bi-pencil-square"></i> {{ title }}</h4>
                    </div>
                    <div class="card-body">
                        <form action="/admin/clubs/{{ club.id }}/edit" method="post">
                            <div class="mb-3">
                                <label for="name" class="form-label">Название</label>
                                <input type="text" class="form-control" id="name" name="name" value="{{ club.name }}" required>
                            </div>
                            <div class="mb-3">
                                <label for="teacher" class="form-label">Преподаватель</label>
                                <input type="text" class="form-control" id="teacher" name="teacher" value="{{ club.teacher }}" required>
                            </div>
                            <div class="mb-3">
                                <label for="room" class="form-label">Кабинет</label>
                                <input type="text" class="form-control" id="room" name="room" value="{{ club.room }}" required>
                            </div>
                            <div class="mb-3">
                                <label for="schedule" class="form-label">Расписание</label>
                                <input type="text" class="form-control" id="schedule" name="schedule" value="{{ club.schedule }}">
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-check-lg"></i> Сохранить
                                </button>
                                <a href="/admin/clubs" class="btn btn-outline-secondary">
                                    <i class="bi bi-x-lg"></i> Отмена
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
