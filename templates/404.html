{% extends "base.html" %}

{% block title %}404 - Страница не найдена{% endblock %}

{% block content %}
{% set hide_nav = true %}

<div class="empty-state">
    <i class="bi bi-emoji-frown"></i>
    <h1 class="display-1">404</h1>
    <h2>Страница не найдена</h2>
    <p class="text-muted">{% if name %}Ученик "{{ name }}" не найден{% else %}Запрашиваемая страница не существует{% endif %}</p>
    <a href="/" class="btn btn-primary btn-lg mt-3"><i class="bi bi-house"></i> Вернуться на главную</a>
</div>
{% endblock %}
