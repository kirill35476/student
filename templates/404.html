<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Ученик не найден</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light d-flex align-items-center min-vh-100">
    <div class="container text-center">
        <div class="card shadow-sm border-0 mx-auto" style="max-width: 500px;">
            <div class="card-body p-5">
                <i class="bi bi-emoji-frown display-1 text-warning"></i>
                <h1 class="display-4 mt-3">404</h1>
                <h2 class="mb-4">Ученик не найден</h2>
                <p class="lead">К сожалению, ученик с именем <strong>"{{ name }}"</strong> не существует.</p>
                <a href="/" class="btn btn-primary btn-lg mt-3">
                    <i class="bi bi-house-door"></i> Вернуться на главную
                </a>
            </div>
        </div>
    </div>
</body>
</html>
