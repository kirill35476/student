{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block breadcrumb_items %}
<li class="breadcrumb-item"><a href="/student/{{ student.id }}">{{ student.name }}</a></li>
<li class="breadcrumb-item active">Редактирование</li>
{% endblock %}

{% block content %}
<div class="form-container">
    <h4 class="mb-4"><i class="bi bi-pencil-square"></i> {{ title }}</h4>
    <form action="/edit/{{ student.id }}" method="post">
        <div class="mb-3"><label class="form-label">Имя</label><input type="text" name="name" class="form-control" value="{{ student.name }}" required></div>
        <div class="mb-3"><label class="form-label">Класс</label><input type="number" name="grade" class="form-control" value="{{ student.grade }}" min="1" max="11" required></div>
        <div class="mb-3"><label class="form-label">Хобби</label><input type="text" name="hobby" class="form-control" value="{{ student.hobby }}" required></div>
        <div class="d-grid gap-2">
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Сохранить</button>
            <a href="/student/{{ student.id }}" class="btn btn-outline-secondary">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
