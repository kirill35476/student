{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block breadcrumb_items %}
<li class="breadcrumb-item"><a href="/student/{{ student.id }}">{{ student.name }}</a></li>
<li class="breadcrumb-item active">Добавить оценку</li>
{% endblock %}

{% block content %}
<div class="form-container">
    <h4 class="mb-4"><i class="bi bi-plus-circle"></i> {{ title }}</h4>
    <form action="/student/{{ student.id }}/add-grade" method="post">
        <div class="mb-3"><label class="form-label">Предмет</label><input type="text" name="subject" class="form-control" placeholder="Математика" required></div>
        <div class="mb-3"><label class="form-label">Оценка</label>
            <select name="score" class="form-select" required>
                <option value="5">5 (отлично)</option><option value="4">4 (хорошо)</option><option value="3">3 (удовл.)</option><option value="2">2 (неуд.)</option>
            </select>
        </div>
        <div class="mb-3"><label class="form-label">Дата</label><input type="date" name="date" class="form-control" required></div>
        <div class="mb-3"><label class="form-label">Комментарий</label><textarea name="comment" class="form-control" rows="2"></textarea></div>
        <div class="d-grid gap-2">
            <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i> Добавить</button>
            <a href="/student/{{ student.id }}" class="btn btn-outline-secondary">Назад</a>
        </div>
    </form>
</div>
<script>document.querySelector('input[name="date"]').valueAsDate = new Date();</script>
{% endblock %}
